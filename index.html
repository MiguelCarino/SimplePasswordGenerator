<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Strong Password Generator + Hash Viewer</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #2f0959;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container {
      width: 100%;
      max-width: 1200px; /* Width limit applied here */
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .subheading {
      margin-bottom: 1.5rem;
      color: #cdebd9;
    }
    .password-box {
      background: #144c2f;
      padding: 1.2rem;
      border-radius: 10px;
      font-size: 1.5rem;
      font-weight: bold;
      word-break: break-all;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
      border: 2px dashed transparent;
      margin-bottom: 1rem;
    }
    .password-box:hover {
      background: #1a5e3a;
      border-color: #2ec971;
    }
    .password-box:active {
      transform: scale(0.99);
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }
    input[type="range"] {
      flex: 1;
      cursor: ns-resize; /* Hint that scrolling works */
    }
    button, select {
      background-color: #2ec971;
      color: white;
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
    }
    button:hover {
      background-color: #26b162;
    }
    .checkboxes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
      margin-bottom: 2rem;
    }
    .checkboxes label {
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    .checkboxes input {
      margin-right: 8px;
    }
    .section {
      margin-top: 2rem;
      border-top: 1px solid #4a1380;
      padding-top: 1rem;
    }
    .output {
      background: #103d26;
      padding: 0.8rem;
      border-radius: 8px;
      word-break: break-all;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }
    .hash-label {
      font-weight: bold;
      margin-top: 1rem;
      margin-bottom: 0.3rem;
      font-size: 0.85rem;
      color: #aaa;
    }
    .copy-btn {
      background: #2ec971;
      border: none;
      color: white;
      padding: 0.4rem;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
    }
    .output-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .output-wrapper .output {
      flex: 1;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #2ec971;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      display: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 Password Generator</h1>
    <p class="subheading">Generated instantly. Click the password to copy.</p>
    
    <div class="password-box" id="passwordOutput" title="Click to copy" onclick="copyMainPassword()">Generating...</div>

    <div class="controls">
      <button onclick="generatePassword()">Generate New</button>
      <input type="range" id="lengthRange" min="8" max="128" value="32" oninput="updateLengthDisplay()" />
      <span id="lengthDisplay" style="min-width: 30px; font-weight: bold;">32</span>
    </div>

    <div class="checkboxes">
      <label><input type="checkbox" id="includeUpper" checked onchange="generatePassword()"> ABC</label>
      <label><input type="checkbox" id="includeLower" checked onchange="generatePassword()"> abc</label>
      <label><input type="checkbox" id="includeDigits" checked onchange="generatePassword()"> 123</label>
      <label><input type="checkbox" id="includeSymbols" checked onchange="generatePassword()"> @#*</label>
      <label><input type="checkbox" id="excludeConfusing" checked onchange="generatePassword()"> Easy to read</label>
    </div>

    <div class="section">
      <h3>🔒 Hash Outputs</h3>
      <div class="hash-label">SHA-256</div>
      <div class="output-wrapper">
        <div class="output" id="sha256Output">—</div>
        <button class="copy-btn" onclick="copyToClipboard('sha256Output')">📋</button>
      </div>
      <div class="hash-label">SHA-1</div>
      <div class="output-wrapper">
        <div class="output" id="sha1Output">—</div>
        <button class="copy-btn" onclick="copyToClipboard('sha1Output')">📋</button>
      </div>
      <div class="hash-label">MD5</div>
      <div class="output-wrapper">
        <div class="output" id="md5Output">—</div>
        <button class="copy-btn" onclick="copyToClipboard('md5Output')">📋</button>
      </div>
      <div class="hash-label">AES-256-GCM (Encrypted with Random Key)</div>
      <div class="output-wrapper">
        <div class="output" id="aesOutput">—</div>
        <button class="copy-btn" onclick="copyToClipboard('aesOutput')">📋</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Copied!</div>

  <script>
    const passwordBox = document.getElementById("passwordOutput");
    const rangeInput = document.getElementById("lengthRange");
    
    const charsetOptions = {
      upper: "ABCDEFGHJKLMNPQRSTUVWXYZ",
      lower: "abcdefghjkmnpqrstuvwxyz",
      digits: "23456789",
      symbols: "!@#$%^&*()_+-=[]{}|;:',.<>/?",
      confusing: "iIl1oO0"
    };

    // 1. Auto-generate on page load
    window.onload = () => {
      generatePassword();
    };

    // 2. Change length with scroll
    rangeInput.addEventListener('wheel', (e) => {
      e.preventDefault();
      const step = parseInt(rangeInput.step || 1);
      if (e.deltaY < 0) {
        rangeInput.value = parseInt(rangeInput.value) + step;
      } else {
        rangeInput.value = parseInt(rangeInput.value) - step;
      }
      updateLengthDisplay();
      generatePassword();
    });

    function updateLengthDisplay() {
      document.getElementById("lengthDisplay").textContent = rangeInput.value;
    }

    function showToast() {
      const toast = document.getElementById("toast");
      toast.style.display = "block";
      setTimeout(() => { toast.style.display = "none"; }, 1500);
    }

    // 3. Copy main password on click
    function copyMainPassword() {
      const text = passwordBox.textContent;
      if (text === "Select at least one character type.") return;
      navigator.clipboard.writeText(text).then(() => {
        showToast();
      });
    }

    function copyToClipboard(id) {
      const el = document.getElementById(id);
      navigator.clipboard.writeText(el.textContent).then(() => {
        showToast();
      });
    }

    function generatePassword() {
      let charset = "";
      if (document.getElementById("includeUpper").checked) charset += charsetOptions.upper;
      if (document.getElementById("includeLower").checked) charset += charsetOptions.lower;
      if (document.getElementById("includeDigits").checked) charset += charsetOptions.digits;
      if (document.getElementById("includeSymbols").checked) charset += charsetOptions.symbols;

      if (!charset) {
        passwordBox.textContent = "Select at least one character type.";
        return;
      }

      if (document.getElementById("excludeConfusing").checked) {
        charset = charset.split("").filter(ch => !charsetOptions.confusing.includes(ch)).join("");
      }

      const length = parseInt(rangeInput.value, 10);
      let password = "";
      
      // Use crypto for better randomness
      const array = new Uint32Array(length);
      window.crypto.getRandomValues(array);

      for (let i = 0; i < length; i++) {
        password += charset[array[i] % charset.length];
      }

      passwordBox.textContent = password;
      updateHashes(password);
      encryptAES(password);
    }

    async function updateHashes(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      
      // SHA-256
      const sha256Buf = await crypto.subtle.digest("SHA-256", data);
      document.getElementById("sha256Output").textContent = Array.from(new Uint8Array(sha256Buf)).map(b => b.toString(16).padStart(2, "0")).join("");

      // SHA-1
      const sha1Buf = await crypto.subtle.digest("SHA-1", data);
      document.getElementById("sha1Output").textContent = Array.from(new Uint8Array(sha1Buf)).map(b => b.toString(16).padStart(2, "0")).join("");

      // MD5
      document.getElementById("md5Output").textContent = md5(password);
    }

    async function encryptAES(password) {
      const enc = new TextEncoder();
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt"]);
      const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, enc.encode(password));
      
      const ivBase64 = btoa(String.fromCharCode(...iv));
      const encryptedBase64 = btoa(String.fromCharCode(...new Uint8Array(encrypted)));
      document.getElementById("aesOutput").textContent = `IV:${ivBase64} | Cipher:${encryptedBase64}`;
    }
