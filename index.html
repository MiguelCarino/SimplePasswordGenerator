<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PassGen — Carino Systems</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@300;400;500;700&family=Red+Hat+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #050505;
      --surface:      #0a0a0a;
      --surface2:     #111111;
      --accent:       #eab308;
      --accent-faint: rgba(234,179,8,0.05);
      --accent-glow:  rgba(234,179,8,0.15);
      --accent-dim:   rgba(234,179,8,0.3);
      --border:       #1f1f1f;
      --border-hv:    #2e2e2e;
      --text:         #ffffff;
      --text-sec:     #a3a3a3;
      --text-muted:   #555555;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── CS HEADER ─────────────────────────────────────────── */
    .cs-header {
      height: 70px; flex-shrink: 0;
      background: linear-gradient(180deg, #0f0f0f 0%, #050505 100%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; gap: 12px; z-index: 100;
    }
    .cs-left { display: flex; align-items: center; gap: 14px; }
    .cs-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .cs-page-name {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 1.4rem; font-weight: 900; line-height: 1;
      background: linear-gradient(130deg, #fef08a 0%, #eab308 50%, #b45309 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      white-space: nowrap;
    }
    .cs-info { display: flex; align-items: baseline; gap: 10px; border-left: 1px solid var(--border); padding-left: 14px; }
    .cs-info-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
    .cs-info-desc  { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--text-muted); white-space: nowrap; }
    .cs-icon-btn {
      width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: 0.2s; text-decoration: none; background: transparent; cursor: pointer;
    }
    .cs-icon-btn:hover { border-color: var(--accent); color: #050505; background: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 12px var(--accent-glow); }
    .cs-icon-btn svg { width: 15px; height: 15px; }

    /* ─── PAGE BODY ─────────────────────────────────────────── */
    .page-body {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 2.5rem 1.5rem;
      overflow-y: auto;
    }

    .container {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ─── SUBHEADING ─────────────────────────────────────────── */
    .subheading {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* ─── PASSWORD BOX ──────────────────────────────────────── */
    .password-box {
      background: var(--surface);
      border: 2px dashed var(--border-hv);
      border-radius: 8px;
      padding: 1.4rem 1.2rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.35rem;
      font-weight: 700;
      word-break: break-all;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      color: var(--text);
      letter-spacing: 0.05em;
    }
    .password-box:hover {
      border-color: var(--accent);
      background: var(--surface2);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .password-box:active { transform: scale(0.995); }

    /* ─── CONTROLS ───────────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      padding: 0.55rem 1.2rem;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--accent); color: #050505; box-shadow: 0 0 12px var(--accent-glow); }

    .length-track {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.4rem 0.9rem;
      min-width: 180px;
    }
    .length-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .length-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 28px;
      text-align: right;
    }

    input[type="range"] {
      flex: 1;
      appearance: none;
      height: 3px;
      background: var(--border-hv);
      border-radius: 2px;
      cursor: pointer;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent-glow);
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); border: none; cursor: pointer;
    }

    /* ─── CHECKBOXES ─────────────────────────────────────────── */
    .checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .check-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.5rem 0.9rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-sec);
      transition: 0.15s;
      user-select: none;
    }
    .check-label:hover { border-color: var(--accent-dim); color: var(--text); }
    .check-label input[type="checkbox"] { display: none; }
    .check-label .chk {
      width: 15px; height: 15px;
      border: 1.5px solid #2e2e2e; border-radius: 3px;
      background: transparent; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 900; color: transparent;
      transition: 0.15s;
    }
    .check-label input:checked + .chk { background: var(--accent); border-color: var(--accent); color: #050505; }
    .check-label input:checked + .chk::after { content: '✓'; }
    .check-label.active { border-color: var(--accent-dim); }

    /* ─── HASH SECTION ───────────────────────────────────────── */
    .section {
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    .section-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .hash-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-top: 14px;
      margin-bottom: 5px;
    }

    .output-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .output {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.55rem 0.8rem;
      border-radius: 5px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-sec);
      word-break: break-all;
      transition: border-color 0.2s;
    }
    .output:hover { border-color: var(--border-hv); }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px; height: 32px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      flex-shrink: 0;
      transition: 0.15s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-faint); }

    /* ─── TOAST ──────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #050505;
      padding: 0.45rem 1.2rem;
      border-radius: 20px;
      display: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      box-shadow: 0 4px 16px var(--accent-glow);
      z-index: 200;
    }

    @media (max-width: 600px) {
      .cs-info-desc { display: none; }
      .page-body { padding: 1.5rem 1rem; }
      .password-box { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header class="cs-header">
  <div class="cs-left">
    <a href="https://carino.systems" class="cs-icon-btn" title="Carino Systems">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </a>
    <span class="cs-page-name">PassGen</span>
    <div class="cs-info">
      <span class="cs-info-title">Password Generator</span>
      <span class="cs-info-desc">Client-Side Only — Zero Server Contact</span>
    </div>
  </div>
  <div class="cs-right">
    <a href="https://github.com/MiguelCarino" target="_blank" class="cs-icon-btn" title="GitHub">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
    </a>
    <a href="https://www.linkedin.com/in/miguelcarino94/" target="_blank" class="cs-icon-btn" title="LinkedIn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
    </a>
  </div>
</header>

<div class="page-body">
  <div class="container">

    <p class="subheading">Generated instantly in your browser. Click the password to copy it.</p>

    <div class="password-box" id="passwordOutput" title="Click to copy" onclick="copyMainPassword()">Generating...</div>

    <div class="controls">
      <button class="btn" onclick="generatePassword()">↻ Generate New</button>
      <div class="length-track">
        <span class="length-label">Length</span>
        <input type="range" id="lengthRange" min="8" max="128" value="32" oninput="updateLengthDisplay()">
        <span class="length-val" id="lengthDisplay">32</span>
      </div>
    </div>

    <div class="checkboxes">
      <label class="check-label active">
        <input type="checkbox" id="includeUpper" checked onchange="syncLabel(this); generatePassword()">
        <span class="chk"></span>ABC
      </label>
      <label class="check-label active">
        <input type="checkbox" id="includeLower" checked onchange="syncLabel(this); generatePassword()">
        <span class="chk"></span>abc
      </label>
      <label class="check-label active">
        <input type="checkbox" id="includeDigits" checked onchange="syncLabel(this); generatePassword()">
        <span class="chk"></span>123
      </label>
      <label class="check-label active">
        <input type="checkbox" id="includeSymbols" checked onchange="syncLabel(this); generatePassword()">
        <span class="chk"></span>@#*
      </label>
      <label class="check-label active">
        <input type="checkbox" id="excludeConfusing" checked onchange="syncLabel(this); generatePassword()">
        <span class="chk"></span>Easy to read
      </label>
    </div>

    <div class="section">
      <div class="section-title">Hash Outputs</div>

      <div class="hash-label">SHA-256</div>
      <div class="output-wrapper">
        <div class="output" id="sha256Output">—</div>
        <button class="copy-btn" onclick="copyToClipboard('sha256Output')" title="Copy">⧉</button>
      </div>

      <div class="hash-label">SHA-1</div>
      <div class="output-wrapper">
        <div class="output" id="sha1Output">—</div>
        <button class="copy-btn" onclick="copyToClipboard('sha1Output')" title="Copy">⧉</button>
      </div>

      <div class="hash-label">MD5</div>
      <div class="output-wrapper">
        <div class="output" id="md5Output">—</div>
        <button class="copy-btn" onclick="copyToClipboard('md5Output')" title="Copy">⧉</button>
      </div>

      <div class="hash-label">AES-256-GCM (Random Key)</div>
      <div class="output-wrapper">
        <div class="output" id="aesOutput">—</div>
        <button class="copy-btn" onclick="copyToClipboard('aesOutput')" title="Copy">⧉</button>
      </div>
    </div>

  </div>
</div>

<div id="toast" class="toast">Copied!</div>

<script>
  const passwordBox = document.getElementById('passwordOutput');
  const rangeInput  = document.getElementById('lengthRange');

  const charsetOptions = {
    upper:    'ABCDEFGHJKLMNPQRSTUVWXYZ',
    lower:    'abcdefghjkmnpqrstuvwxyz',
    digits:   '23456789',
    symbols:  '!@#$%^&*()_+-=[]{}|;:\',./<>?',
    confusing:'iIl1oO0'
  };

  window.onload = () => generatePassword();

  // Scroll wheel on range input
  rangeInput.addEventListener('wheel', (e) => {
    e.preventDefault();
    rangeInput.value = parseInt(rangeInput.value) + (e.deltaY < 0 ? 1 : -1);
    updateLengthDisplay();
    generatePassword();
  });

  function updateLengthDisplay() {
    document.getElementById('lengthDisplay').textContent = rangeInput.value;
  }

  function syncLabel(cb) {
    cb.closest('.check-label').classList.toggle('active', cb.checked);
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 1400);
  }

  function copyMainPassword() {
    const text = passwordBox.textContent;
    if (text === 'Select at least one character type.') return;
    navigator.clipboard.writeText(text).then(showToast);
  }

  function copyToClipboard(id) {
    navigator.clipboard.writeText(document.getElementById(id).textContent).then(showToast);
  }

  function generatePassword() {
    let charset = '';
    if (document.getElementById('includeUpper').checked)  charset += charsetOptions.upper;
    if (document.getElementById('includeLower').checked)  charset += charsetOptions.lower;
    if (document.getElementById('includeDigits').checked) charset += charsetOptions.digits;
    if (document.getElementById('includeSymbols').checked)charset += charsetOptions.symbols;

    if (!charset) {
      passwordBox.textContent = 'Select at least one character type.';
      return;
    }
    if (document.getElementById('excludeConfusing').checked) {
      charset = charset.split('').filter(ch => !charsetOptions.confusing.includes(ch)).join('');
    }

    const length = parseInt(rangeInput.value, 10);
    const array  = new Uint32Array(length);
    window.crypto.getRandomValues(array);
    const password = Array.from(array, v => charset[v % charset.length]).join('');

    passwordBox.textContent = password;
    updateHashes(password);
    encryptAES(password);
  }

  async function updateHashes(password) {
    const data = new TextEncoder().encode(password);
    const [s256, s1] = await Promise.all([
      crypto.subtle.digest('SHA-256', data),
      crypto.subtle.digest('SHA-1',   data),
    ]);
    const hex = buf => Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    document.getElementById('sha256Output').textContent = hex(s256);
    document.getElementById('sha1Output').textContent   = hex(s1);
    document.getElementById('md5Output').textContent    = md5(password);
  }

  async function encryptAES(password) {
    const enc = new TextEncoder();
    const iv  = crypto.getRandomValues(new Uint8Array(12));
    const key = await crypto.subtle.generateKey({ name: 'AES-GCM', length: 256 }, true, ['encrypt']);
    const ct  = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(password));
    const b64 = arr => btoa(String.fromCharCode(...new Uint8Array(arr)));
    document.getElementById('aesOutput').textContent = `IV:${b64(iv)} | Cipher:${b64(ct)}`;
  }
