<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/webp" href="logo.webp">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- connect-src 'none' makes "nothing leaves your browser" a rule the browser
       enforces, not a promise this page makes. Everything here is local. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none';
        script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';
        font-src 'self'; img-src 'self' data:; connect-src 'none';
        form-action 'none'; base-uri 'none'">
  <title>Password — Carino Systems</title>
  <meta name="description" content="Make a strong password, and send it to someone safely. Everything happens in your browser.">
  <link rel="stylesheet" href="fonts/carino-fonts.css">
  <style>
    :root {
      --bg:           #050505;
      --surface:      #0a0a0a;
      --surface2:     #111111;
      --accent:       #eab308;
      --accent-faint: rgba(234,179,8,0.05);
      --accent-glow:  rgba(234,179,8,0.15);
      --accent-dim:   rgba(234,179,8,0.3);
      --border:       #1f1f1f;
      --border-hv:    #2e2e2e;
      --text:         #ffffff;
      --text-sec:     #c4c4c4;   /* guiding text — 11.7:1 on the page background */
      --text-muted:   #8f8f8f;   /* placeholders and sub-labels — 6.3:1 */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── CS HEADER ─────────────────────────────────────────── */
    .cs-header {
      height: 70px; flex-shrink: 0;
      background: linear-gradient(180deg, #0f0f0f 0%, #050505 100%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; gap: 12px; z-index: 100;
    }
    .cs-left { display: flex; align-items: center; gap: 14px; }
    .cs-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .cs-page-name {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 1.4rem; font-weight: 900; line-height: 1;
      background: linear-gradient(130deg, #fef08a 0%, #eab308 50%, #b45309 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      white-space: nowrap;
    }
    .cs-info { display: flex; align-items: baseline; gap: 10px; border-left: 1px solid var(--border); padding-left: 14px; }
    .cs-info-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
    .cs-info-desc  { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--text-muted); white-space: nowrap; }
    .cs-icon-btn {
      width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: 0.2s; text-decoration: none; background: transparent; cursor: pointer;
    }
    .cs-icon-btn:hover { border-color: var(--accent); color: #050505; background: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 12px var(--accent-glow); }
    .cs-icon-btn svg { width: 15px; height: 15px; }

    /* ─── PAGE ──────────────────────────────────────────────── */
    .page-body { flex: 1; display: flex; justify-content: center; padding: 2.5rem 1.5rem; overflow-y: auto; }
    .container { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 22px; }

    .main-tabs { display: flex; gap: 22px; border-bottom: 1px solid var(--border); }
    .main-tab {
      background: transparent; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      color: var(--text-muted); padding: 0.55rem 0.15rem 0.7rem;
      cursor: pointer; transition: 0.15s;
      font-family: 'Red Hat Display', sans-serif;
      font-size: 0.95rem; font-weight: 900;
    }
    .main-tab:hover { color: var(--text); }
    .main-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .view { display: flex; flex-direction: column; gap: 22px; }
    .hidden { display: none; }

    /* ─── PASSWORD ──────────────────────────────────────────── */
    .password-box {
      background: var(--surface);
      border: 2px dashed var(--border-hv);
      border-radius: 8px;
      padding: 1.5rem 1.2rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.35rem; font-weight: 700;
      word-break: break-all; cursor: pointer; text-align: center;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      letter-spacing: 0.05em;
    }
    .password-box:hover { border-color: var(--accent); background: var(--surface2); box-shadow: 0 0 20px var(--accent-glow); }
    .password-box:active { transform: scale(0.995); }
    .box-hint { text-align: center; font-size: 0.78rem; color: var(--text-sec); margin-top: -14px; }

    .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .btn {
      background: transparent; border: 1px solid var(--accent-dim); color: var(--accent);
      padding: 0.6rem 1.2rem; border-radius: 5px; cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif; font-size: 0.85rem; font-weight: 600;
      transition: 0.2s; white-space: nowrap;
    }
    .btn:hover { background: var(--accent); color: #050505; box-shadow: 0 0 12px var(--accent-glow); }
    .btn.plain { border-color: var(--border); color: var(--text-sec); }
    .btn.plain:hover { background: var(--surface2); color: var(--text); border-color: var(--border-hv); box-shadow: none; }
    .btn.small { padding: 0.4rem 0.8rem; font-size: 0.78rem; }

    .opt-label { font-size: 0.8rem; color: var(--text-sec); margin-bottom: 8px; }

    .presets { display: flex; gap: 8px; flex-wrap: wrap; }
    .preset {
      background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
      color: var(--text-sec); padding: 0.55rem 1rem; cursor: pointer; transition: 0.15s;
      font-family: 'IBM Plex Sans', sans-serif; font-size: 0.85rem;
    }
    .preset:hover { border-color: var(--accent-dim); color: var(--text); }
    .preset.active { border-color: var(--accent); color: var(--accent); background: var(--accent-faint); }
    .preset small { display: block; font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }
    .preset.active small { color: var(--accent); }

    .check-label {
      display: inline-flex; align-items: center; gap: 9px; cursor: pointer;
      background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
      padding: 0.55rem 0.9rem; font-size: 0.82rem; color: var(--text-sec);
      transition: 0.15s; user-select: none;
    }
    .check-label:hover { border-color: var(--accent-dim); color: var(--text); }
    .check-label input { display: none; }
    .check-label .chk {
      width: 15px; height: 15px; border: 1.5px solid #2e2e2e; border-radius: 3px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 900; color: transparent; transition: 0.15s;
    }
    .check-label input:checked + .chk { background: var(--accent); border-color: var(--accent); color: #050505; }
    .check-label input:checked + .chk::after { content: '✓'; }
    .check-label.active { border-color: var(--accent-dim); }

    /* ─── SEND / OPEN ───────────────────────────────────────── */
    .field {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 5px; padding: 0.7rem 0.85rem; color: var(--text);
      font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; line-height: 1.5;
      resize: vertical; outline: none; transition: border-color 0.2s;
    }
    .field:focus { border-color: var(--accent-dim); }
    .field::placeholder { color: var(--text-muted); font-family: 'IBM Plex Sans', sans-serif; }

    .part {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; overflow: hidden;
    }
    .part-head {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 0.6rem 0.85rem; background: var(--surface2); border-bottom: 1px solid var(--border);
    }
    .part-num { font-size: 0.85rem; font-weight: 700; color: var(--accent); }
    .part-msg {
      padding: 0.85rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
      line-height: 1.7; color: var(--text-sec); white-space: pre-wrap; word-break: break-all;
    }
    .part-msg .code { color: var(--text); font-weight: 700; }

    .note {
      background: var(--accent-faint); border-left: 2px solid var(--accent-dim);
      border-radius: 0 5px 5px 0; padding: 0.85rem 1rem;
      font-size: 0.85rem; line-height: 1.7; color: var(--text-sec);
    }
    .note b { color: var(--accent); font-weight: 600; }
    .note.bad { background: rgba(239,68,68,0.06); border-left-color: rgba(239,68,68,0.45); }
    .note.bad b { color: #ef4444; }

    .recovered {
      background: var(--surface); border: 1px dashed var(--border-hv); border-radius: 6px;
      padding: 1rem; font-family: 'IBM Plex Mono', monospace; font-size: 1.05rem;
      font-weight: 700; word-break: break-all; cursor: pointer; text-align: center;
    }
    .recovered:hover { border-color: var(--accent); background: var(--surface2); }

    .advanced {
      border-top: 1px solid var(--border); padding-top: 18px;
      font-size: 0.82rem; color: var(--text-sec); line-height: 1.6;
    }
    .advanced a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-dim); }
    .advanced a:hover { border-bottom-color: var(--accent); }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #050505; padding: 0.5rem 1.3rem;
      border-radius: 20px; display: none; font-size: 0.85rem; font-weight: 700;
      box-shadow: 0 4px 16px var(--accent-glow); z-index: 200;
    }

    @media (max-width: 600px) {
      .cs-info-desc { display: none; }
      .page-body { padding: 1.5rem 1rem; }
      .password-box { font-size: 1rem; }
      .main-tabs { gap: 16px; }
      .main-tab { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<div class="page-body">
  <div class="container">

    <div class="main-tabs">
      <button class="main-tab active" id="tabMake" onclick="goTab('password')">Generate a password</button>
      <button class="main-tab"        id="tabSend" onclick="goTab('send')">Send a password</button>
      <button class="main-tab"        id="tabOpen" onclick="goTab('open')">Discover a password</button>
    </div>

    <!-- ─── MAKE ONE ─────────────────────────────────────────── -->
    <div class="view" id="viewMake">

      <div class="password-box" id="passwordOutput" title="Click to copy" onclick="copyPassword()">…</div>
      <p class="box-hint">Click the password to copy it.</p>

      <div class="controls">
        <button class="btn" onclick="newPassword()">Make another</button>
        <button class="btn plain" onclick="sendThis()">Send this safely →</button>
      </div>

      <div>
        <div class="opt-label">How long?</div>
        <div class="presets" id="presets"></div>
      </div>

      <label class="check-label active" id="simpleLabel">
        <input type="checkbox" id="lettersOnly" checked onchange="syncCheck(this); newPassword()">
        <span class="chk"></span>Letters and numbers only
      </label>
      <p class="box-hint" style="margin-top:-14px; text-align:left">
        Turn this off to add symbols, if the website accepts them.
      </p>

    </div>

    <!-- ─── SEND IT SAFELY ───────────────────────────────────── -->
    <div class="view hidden" id="viewSend">

      <textarea class="field" id="secretInput" rows="2" oninput="scheduleSplit()"
                spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off"
                placeholder="Paste the password you need to send"></textarea>

      <div id="sendError" class="note bad hidden"></div>
      <div id="parts" style="display:flex; flex-direction:column; gap:14px"></div>

      <p class="box-hint hidden" id="sendHow" style="text-align:left; margin-top:-4px">
        Send each part a different way — one by email, one by text.
        One part on its own gives nothing away.
      </p>

      <p class="advanced">Need more parts? <a href="https://hash.carino.systems/#share">Full version</a>.</p>

    </div>

    <!-- ─── OPEN WHAT I WAS SENT ─────────────────────────────── -->
    <div class="view hidden" id="viewOpen">

      <textarea class="field" id="partsInput" rows="7" oninput="scheduleOpen()"
                spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off"
                placeholder="Paste both messages here, one after the other"></textarea>

      <div id="openError" class="note bad hidden"></div>

      <div id="openResult" class="hidden">
        <div class="recovered" id="openedText" title="Click to copy" onclick="copyOpened()"></div>
        <p class="box-hint" style="margin-top:10px">Click to copy.</p>
      </div>

    </div>

  </div>
</div>

<div id="toast" class="toast">Copied</div>

<script src="carino-secrets.js"></script>
<script>
  const CS  = window.CarinoSecrets;
  const $   = id => document.getElementById(id);
  const box = $('passwordOutput');

  /* ─── Making a password ─────────────────────────────────────────────── */
  // Ambiguous characters are always excluded: this password will be read off a
  // screen and typed by hand, and 1/l/I costs more than the entropy is worth.
  const ALPHA   = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz';
  const DIGITS  = '23456789';
  const SYMBOLS = '!@#$%&*+-=?';
  const LENGTHS = [
    { label: 'Short',  len: 12, note: '12 characters' },
    { label: 'Medium', len: 20, note: '20 characters' },
    { label: 'Long',   len: 32, note: '32 characters' },
  ];
  let chosen = 0;

  (function buildPresets() {
    const wrap = $('presets');
    LENGTHS.forEach((p, i) => {
      const b = document.createElement('button');
      b.className = 'preset' + (i === chosen ? ' active' : '');
      b.innerHTML = '';
      b.appendChild(document.createTextNode(p.label));
      const s = document.createElement('small');
      s.textContent = p.note;
      b.appendChild(s);
      b.onclick = () => {
        chosen = i;
        [...wrap.children].forEach((c, j) => c.classList.toggle('active', j === i));
        newPassword();
      };
      wrap.appendChild(b);
    });
  })();

  function newPassword() {
    let set = ALPHA + DIGITS;
    if (!$('lettersOnly').checked) set += SYMBOLS;
    const n = LENGTHS[chosen].len;
    const r = new Uint32Array(n);
    crypto.getRandomValues(r);
    // Rejection-free modulo bias is negligible here (2^32 vs a ~57-char set),
    // but draw fresh values rather than reusing any.
    box.textContent = Array.from(r, v => set[v % set.length]).join('');
  }

  function syncCheck(cb) { cb.closest('.check-label').classList.toggle('active', cb.checked); }

  function copyPassword() { copy(box.textContent); }
  function copyOpened()   { copy($('openedText').textContent); }

  function copy(text) {
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const t = $('toast');
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 1400);
    });
  }

  /* ─── Sending it safely ─────────────────────────────────────────────── */
  function sendThis() {
    $('secretInput').value = box.textContent;
    goTab('send');
    runSplit();
  }

  let splitTimer = null;
  function scheduleSplit(delay = 220) { clearTimeout(splitTimer); splitTimer = setTimeout(runSplit, delay); }

  async function runSplit() {
    clearTimeout(splitTimer);
    const parts = $('parts');
    parts.textContent = '';
    $('sendError').classList.add('hidden');
    $('sendHow').classList.add('hidden');

    const secret = $('secretInput').value;
    if (!secret) return;                       // empty box: clear, don't scold

    let shares;
    try { shares = await CS.split(secret, 2, 2); }
    catch (e) { return fail('sendError', e.message); }

    shares.forEach(s => {
      const card = document.createElement('div');
      card.className = 'part';

      const head = document.createElement('div');
      head.className = 'part-head';
      const num = document.createElement('span');
      num.className = 'part-num';
      num.textContent = `Part ${s.index} of ${s.total}`;
      const btn = document.createElement('button');
      btn.className = 'btn small';
      btn.textContent = 'Copy';
      btn.onclick = () => copy(s.text);
      head.append(num, btn);

      const body = document.createElement('pre');
      body.className = 'part-msg';
      body.textContent = s.text;

      card.append(head, body);
      parts.appendChild(card);
    });

    $('sendHow').classList.remove('hidden');
  }

  /* ─── Opening what you were sent ────────────────────────────────────── */
  let openTimer = null;
  function scheduleOpen(delay = 300) { clearTimeout(openTimer); openTimer = setTimeout(runOpen, delay); }

  async function runOpen() {
    clearTimeout(openTimer);
    $('openError').classList.add('hidden');
    $('openResult').classList.add('hidden');

    const text = $('partsInput').value;
    if (!/CS[1IL]-/i.test(text)) return;       // nothing that looks like a part yet

    let out;
    try { out = await CS.recover(text); }
    catch (e) { return fail('openError', e.message); }

    $('openedText').textContent = out.secret;
    $('openResult').classList.remove('hidden');
  }

  // Text nodes, not innerHTML: these messages quote what was pasted in.
  function fail(id, msg) {
    const el = $(id);
    el.textContent = '';
    const b = document.createElement('b');
    b.textContent = 'That did not work.';
    el.append(b, document.createTextNode(' ' + msg.charAt(0).toUpperCase() + msg.slice(1) + '.'));
    el.classList.remove('hidden');
  }

  /* ─── Tabs, addressable by link ─────────────────────────────────────── */
  const ROUTES = {
    password: 'make', pass: 'make', generate: 'make', make: 'make',
    send: 'send', share: 'send', split: 'send',
    open: 'open', recover: 'open', combine: 'open',
  };

  function applyRoute() {
    const key  = location.hash.replace(/^#\/?/, '').toLowerCase();
    const view = ROUTES[key] || 'make';
    for (const [name, tab] of [['Make','tabMake'], ['Send','tabSend'], ['Open','tabOpen']]) {
      const on = name.toLowerCase() === view;
      $('view' + name).classList.toggle('hidden', !on);
      $(tab).classList.toggle('active', on);
    }
  }

  // Clicking writes the hash; the listener does the switching, so Back works
  // and every tab is a link you can send someone.
  function goTab(name) {
    if (location.hash.replace(/^#\/?/, '').toLowerCase() === name) return applyRoute();
    location.hash = name;
  }

  window.addEventListener('hashchange', applyRoute);
  applyRoute();
  newPassword();
</script>
<script src="carino-navbar.js" data-app="Password" defer></script>
</body>
</html>
